spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true

app:
  security:
    password-regex: '^(?=.*[A-Z])(?=.*[a-z])(?=.*\d).{8,}$'
    jwt-secret: "my-super-secret-key-123456789012345"
    jwt-expiration: 3600000