spring:
  api-docs:
    enabled: true
  swagger-ui:
    use-root-path: true
  datasource:
    url: ${DB_URL:jdbc:h2:mem:testdb}
    driverClassName: org.h2.Driver
    username: ${DB_USER:sa}
    password: ${DB_PASS:}

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: ${SHOW_SQL:true}

  h2:
    console:
      enabled: ${H2_CONSOLE:true}

server:
  forward-headers-strategy: framework

app:
  security:
    password-regex: ${PASSWORD_REGEX:^(?=.*[A-Z])(?=.*[a-z])(?=.*\d).{8,}$}
    jwt-secret: ${JWT_SECRET:my-super-secret-key-12345678901234567890abcdef}
    jwt-expiration: ${JWT_EXPIRATION:3600000}